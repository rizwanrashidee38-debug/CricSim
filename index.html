
                                                            

                                           <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Career Simulator</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-color: #141414;
            --accent-color: #ffb300;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --tile-color: #1b5e20;
            --tile-hover: #2e7d32;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .screen { display: none; padding: 25px; }
        .screen.active { display: block; }

        h2, h3 { color: var(--accent-color); margin-bottom: 20px; font-weight: bold; }
        
        /* Forms */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            background: var(--card-color);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--accent-color); }

        .btn {
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }

        /* Split Screen Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .game-layout { grid-template-columns: 1fr; }
        }

        /* Scorecard Panels */
        .match-card {
            background: var(--card-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }
        .match-header { font-size: 15px; color: var(--accent-color); font-weight: bold; margin-bottom: 6px; }
        .team-batting { font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-bottom: 12px; color: #fff; }
        .main-score { font-size: 46px; font-weight: bold; margin: 8px 0; color: #ffffff; }
        .match-meta { color: var(--text-muted); font-size: 14px; margin-bottom: 6px; }
        .target-text { color: var(--accent-color); font-size: 15px; font-weight: bold; }

        /* Console Interface */
        .console-box {
            background: #060606;
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }
        .log-wkt { color: #ff5252; font-weight: bold; }
        .log-good { color: #4caf50; font-weight: bold; }

        /* Batting Tiles UI */
        .tiles-container { margin: 15px 0; text-align: center; }
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        .tile {
            background-color: var(--tile-color);
            aspect-ratio: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, transform 0.1s;
            border: 1px solid #143e17;
        }
        .tile:hover { background-color: var(--tile-hover); transform: scale(1.02); }
        .tile:active { transform: scale(0.98); }

        /* Sidebar Standings context panels */
        .sidebar {
            background: var(--card-color);
            border-radius: 8px;
            padding: 18px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar-section h4 { border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 12px; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .standing-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px solid #1a1a1a;
        }
        .standing-row.highlight { color: var(--accent-color); font-weight: bold; }

        .target-badge {
            background: #0b0b0b;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--accent-color);
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="game-container">

    <div id="screen-setup" class="screen active">
        <h2>🏏 Create Your Cricket Career</h2>
        <div class="form-group">
            <label>Player Name</label>
            <input type="text" id="player-name" value="Rizwan">
        </div>
        <div class="form-group">
            <label>Home State (India)</label>
            <select id="player-state">
                <option value="Maharashtra">Maharashtra</option>
                <option value="Delhi">Delhi</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Mumbai">Mumbai</option>
            </select>
        </div>
        <div class="form-group">
            <label>Playing Role</label>
            <select id="player-role">
                <option value="All-Rounder">All-Rounder</option>
                <option value="Batsman">Pure Batsman</option>
                <option value="Bowler">Bowling Specialist</option>
            </select>
        </div>
        <div class="form-group">
            <label>Batting Order Position</label>
            <select id="player-pos">
                <option value="5">Middle Order (No. 5)</option>
                <option value="1">Opener (No. 1)</option>
                <option value="3">Top Order (No. 3)</option>
                <option value="7">Finisher (No. 7)</option>
            </select>
        </div>
        <button class="btn" onclick="startCricketCareer()">Start Career</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-layout">
            
            <div>
                <div class="match-card">
                    <div id="ui-vs-header" class="match-header">vs Wardha Warriors</div>
                    <div id="ui-batting-team" class="team-batting">TEAM BATTING</div>
                    <div id="ui-score" class="main-score">0 - 0</div>
                    <div id="ui-meta" class="match-meta">Innings 1 | Overs: 0.0 / 20.0</div>
                    <div id="ui-target" class="target-text"></div>
                </div>

                <div id="game-console" class="console-box"></div>

                <div id="action-input-area">
                    <div id="batting-tiles-deck" class="tiles-container" style="display: none;">
                        <p style="font-size:12px; color:var(--text-muted); margin-bottom: 5px;">Tap a masked tile to face the delivery:</p>
                        <div class="tiles-grid">
                            <div class="tile" onclick="userSelectTile()">?</div>
                            <div class="tile" onclick="userSelectTile()">?</div>
                            <div class="tile" onclick="userSelectTile()">?</div>
                            <div class="tile" onclick="userSelectTile()">?</div>
                        </div>
                    </div>

                    <button id="control-btn" class="btn" onclick="processGameAction()">Walk Out For Toss</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <h4 id="ui-tier-title">Division 3 League</h4>
                    <div id="ui-standings"></div>
                </div>

                <div class="sidebar-section">
                    <h4>🎯 Level Upgrade Target</h4>
                    <div class="target-badge">
                        <p id="ui-target-desc">Score goals to advance tiers.</p>
                        <p style="margin-top: 8px;"><strong id="ui-stat-runs">Runs: 0</strong></p>
                        <p><strong id="ui-stat-wkts">Wickets: 0</strong></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
    // Career Stage Level Master Configuration
    const CAREER_TIERS = [
        { name: "Division 3 League", teams: ["Butibori Blasters", "Hingna Hurricanes", "Umred United", "Nagpur Nightriders", "Wardha Warriors"], runReq: 150, wktReq: 4 },
        { name: "Division 2 League", teams: ["Nagpur Titans", "Amravati Aces", "Akola Anchors", "Gondia Giants", "Yavatmal Yaks"], runReq: 250, wktReq: 6 },
        { name: "Division 1 League", teams: ["Mumbai Monarchs", "Pune Pioneers", "Nashik Knights", "Thane Thunder", "Solapur Stars"], runReq: 350, wktReq: 8 },
        { name: "Ranji Trophy", teams: ["Maharashtra", "Mumbai", "Karnataka", "Delhi", "Tamil Nadu", "Baroda"], runReq: 500, wktReq: 12 },
        { name: "Team India International", teams: ["India", "Australia", "England", "Pakistan", "South Africa", "New Zealand"], runReq: 800, wktReq: 18 }
    ];

    // Global Dynamic State Models
    let playerProfile = { name: "Rizwan", state: "Maharashtra", role: "All-Rounder", battingPos: 5, teamName: "Kamptee Knights" };
    let careerStats = { currentTierIdx: 0, runs: 0, wickets: 0, matchDay: 1, maxMatches: 5 };
    let leagueStandings = {};
    
    let matchEngine = {
        opponent: "",
        inningsNum: 1,
        userBattingFirst: true,
        overs: 0, balls: 0,
        runs: 0, wickets: 0,
        targetValue: null,
        
        isPlayerAtCrease: false,
        hasPlayerBattedThisMatch: false,
        lastBowledOverNum: -2,
        userOversBowledThisInnings: 0,
        
        flowState: "TRIGGER_TOSS" // State machine router string anchor
    };

    function startCricketCareer() {
        // Collect UI elements accurately values
        playerProfile.name = document.getElementById("player-name").value.trim() || "Rizwan";
        playerProfile.state = document.getElementById("player-state").value;
        playerProfile.role = document.getElementById("player-role").value;
        playerProfile.battingPos = parseInt(document.getElementById("player-pos").value);

        // Customize User Franchise team identity tag based on structural level context
        updateUserFranchiseTeamIdentity();
        generateLeagueTable();
        
        // Show Core Main Board Frame Window Context 
        document.getElementById("screen-setup").classList.remove("active");
        document.getElementById("screen-game").classList.add("active");
        
        triggerFreshMatchSetup();
    }

    function updateUserFranchiseTeamIdentity() {
        let currentTierName = CAREER_TIERS[careerStats.currentTierIdx].name;
        if (currentTierName === "Ranji Trophy") {
            playerProfile.teamName = playerProfile.state;
        } else if (currentTierName === "Team India International") {
            playerProfile.teamName = "India";
        } else {
            playerProfile.teamName = playerProfile.name + "s XI (You)";
        }
    }

    function generateLeagueTable() {
        leagueStandings = {};
        leagueStandings[playerProfile.teamName] = 0;
        let tierTeams = CAREER_TIERS[careerStats.currentTierIdx].teams;
        tierTeams.forEach(t => {
            if (t !== playerProfile.teamName) leagueStandings[t] = 0;
        });
        refreshDashboardUI();
    }

    function refreshDashboardUI() {
        let tier = CAREER_TIERS[careerStats.currentTierIdx];
        document.getElementById("ui-tier-title").innerText = tier.name;
        document.getElementById("ui-target-desc").innerText = `Reach ${tier.runReq} runs & ${tier.wktReq} wickets across games to secure institutional promotion selection.`;
        document.getElementById("ui-stat-runs").innerText = `Career Runs: ${careerStats.runs}`;
        document.getElementById("ui-stat-wkts").innerText = `Career Wickets: ${careerStats.wickets}`;

        // Paint dynamic table context strings sorted
        let sortedTeams = Object.keys(leagueStandings).sort((a,b) => leagueStandings[b] - leagueStandings[a]);
        let htmlBlock = `<div class="standing-row" style="font-weight:bold; color:var(--text-muted); border-bottom:1px solid #333;"><span>Club Team</span><span>Pts</span></div>`;
        sortedTeams.forEach(team => {
            let isUser = (team === playerProfile.teamName || team.includes("(You)"));
            htmlBlock += `<div class="standing-row ${isUser ? 'highlight' : ''}">
                <span>${team}</span>
                <span>${leagueStandings[team]}</span>
            </div>`;
        });
        document.getElementById("ui-standings").innerHTML = htmlBlock;
    }

    function printLog(msg, type = "") {
        let box = document.getElementById("game-console");
        let p = document.createElement("p");
        if(type) p.className = type;
        p.innerHTML = `> ${msg}`;
        box.appendChild(p);
        box.scrollTop = box.scrollHeight;
    }

    function triggerFreshMatchSetup() {
        let tier = CAREER_TIERS[careerStats.currentTierIdx];
        let oppositions = Object.keys(leagueStandings).filter(t => t !== playerProfile.teamName);
        matchEngine.opponent = oppositions[(careerStats.matchDay - 1) % oppositions.length];

        document.getElementById("ui-vs-header").innerText = `Matchday ${careerStats.matchDay}/${careerStats.maxMatches} vs ${matchEngine.opponent}`;
        document.getElementById("game-console").innerHTML = "";
        printLog(`Arrived at standard match venue setup. Complete field calls initialization routines.`);
        
        updateEngineFlowState("TRIGGER_TOSS");
    }

    function updateEngineFlowState(state) {
        matchEngine.flowState = state;
        let deck = document.getElementById("batting-tiles-deck");
        let btn = document.getElementById("control-btn");

        if (state === "USER_BATTING_LOOP") {
            deck.style.display = "block";
            btn.style.display = "none";
        } else {
            deck.style.display = "none";
            btn.style.display = "block";
            
            if(state === "TRIGGER_TOSS") btn.innerText = "Walk Out For Toss";
            else if(state === "PREPARE_INN_1" || state === "PREPARE_INN_2") btn.innerText = "Begin Next Innings";
            else if(state === "USER_BOWLING_SPELL") btn.innerText = "Bowl Designated Delivery Assignment";
            else if(state === "FAST_FORWARD_SIMULATION") btn.innerText = "Innings Complete? Fast Forward";
            else if(state === "MATCH_FINALIZE") btn.innerText = "Process Post-Match Calculations";
        }
        syncScorecardUI();
    }

    function syncScorecardUI() {
        let battingTeam = "";
        if(matchEngine.inningsNum === 1) {
            battingTeam = matchEngine.userBattingFirst ? playerProfile.teamName : matchEngine.opponent;
        } else {
            battingTeam = matchEngine.userBattingFirst ? matchEngine.opponent : playerProfile.teamName;
        }

        document.getElementById("ui-batting-team").innerText = `${battingTeam.toUpperCase()} BATTING`;
        document.getElementById("ui-score").innerText = `${matchEngine.runs} - ${matchEngine.wickets}`;
        document.getElementById("ui-meta").innerText = `Innings ${matchEngine.inningsNum} | Overs: ${matchEngine.overs}.${matchEngine.balls} / 20.0`;
        
        if(matchEngine.inningsNum === 2 && matchEngine.targetValue !== null) {
            document.getElementById("ui-target").innerText = `Target: ${matchEngine.targetValue}`;
        } else {
            document.getElementById("ui-target").innerText = "";
        }
    }

    function processGameAction() {
        switch(matchEngine.flowState) {
            case "TRIGGER_TOSS": 
                runCoinTossMechanic(); 
                break;
            case "PREPARE_INN_1": 
                loadInningsSequence(1); 
                break;
            case "PREPARE_INN_2": 
                loadInningsSequence(2); 
                break;
            case "USER_BOWLING_SPELL": 
                executeUserBowlingBall(); 
                break;
            case "FAST_FORWARD_SIMULATION": 
                completeRemainingInningsAuto(); 
                break;
            case "MATCH_FINALIZE": 
                resolveMatchPointsAllocation(); 
                break;
        }
    }

    function runCoinTossMechanic() {
        let userWinsToss = Math.random() < 0.5;
        let choiceIsBat = Math.random() < 0.5; 

        if (userWinsToss) {
            printLog(`Your captain wins the toss coin flip analysis check!`);
            matchEngine.userBattingFirst = choiceIsBat;
            printLog(`Decision made to ${choiceIsBat ? 'BAT' : 'BOWL'} first standard structure configuration.`);
        } else {
            printLog(`${matchEngine.opponent} captain wins the toss decision analysis.`);
            matchEngine.userBattingFirst = !choiceIsBat;
            printLog(`${matchEngine.opponent} elects to ${choiceIsBat ? 'BOWL' : 'BAT'} first.`);
        }
        updateEngineFlowState("PREPARE_INN_1");
    }

    function loadInningsSequence(inn) {
        matchEngine.inningsNum = inn;
        matchEngine.overs = 0; matchEngine.balls = 0;
        matchEngine.runs = 0; matchEngine.wickets = 0;
        matchEngine.isPlayerAtCrease = false;
        matchEngine.hasPlayerBattedThisMatch = false;
        matchEngine.userOversBowledThisInnings = 0;
        matchEngine.lastBowledOverNum = -2;

        let activeUserBatting = (inn === 1 && matchEngine.userBattingFirst) || (inn === 2 && !matchEngine.userBattingFirst);
        printLog(`--- INNINGS ${inn} INITIALIZED ---`, "log-good");

        if (activeUserBatting) {
            printLog(`${playerProfile.teamName} batting cycle setup initialized.`);
            if (playerProfile.battingPos === 1) {
                deployUserToCrease();
            } else {
                printLog(`Simulating openers entry down to player order placement...`);
                autoSimulateToPlayerArrival();
            }
        } else {
            printLog(`${matchEngine.opponent} batting initialized. Prepping strategic tactical tracking.`);
            assessBowlingRoutines();
        }
    }

    function autoSimulateToPlayerArrival() {
        while (matchEngine.wickets < (playerProfile.battingPos - 1) && matchEngine.overs < 20) {
            processAILiveBall(0.08, 5.2);
            if (verifyInningsTerminationCheck()) break;
        }

        if (matchEngine.wickets >= (playerProfile.battingPos - 1) && matchEngine.overs < 20) {
            deployUserToCrease();
        } else {
            updateEngineFlowState("FAST_FORWARD_SIMULATION");
        }
    }

    function deployUserToCrease() {
        matchEngine.isPlayerAtCrease = true;
        matchEngine.hasPlayerBattedThisMatch = true;
        printLog(`🏏 WICKET! You step out onto the field at position No. ${playerProfile.battingPos}. Make it count!`, "log-good");
        updateEngineFlowState("USER_BATTING_LOOP");
    }

    // Interactive 4 Masked Tile Batting Loop Input Mechanic Hooks
    function userSelectTile() {
        if (!matchEngine.isPlayerAtCrease) return;

        let outputsPool = ["1", "2", "3", "4", "6", "bowled", "catch"];
        let resultString = outputsPool[Math.floor(Math.random() * outputsPool.length)];

        incrementBallMetricCounters();

        if (resultString === "bowled" || resultString === "catch") {
            matchEngine.wickets++;
            matchEngine.isPlayerAtCrease = false;
            printLog(`WICKET! You are out via ${resultString}! Innings over for you.`, "log-wkt");
            
            if (verifyInningsTerminationCheck()) {
                handleInningsWrapSequence();
            } else {
                updateEngineFlowState("FAST_FORWARD_SIMULATION");
            }
        } else {
            let scoreInt = parseInt(resultString);
            matchEngine.runs += scoreInt;
            careerStats.runs += scoreInt; // Track career runs directly
            printLog(`You timed the delivery perfectly! Added ${scoreInt} run(s) to the scorecard.`);
            
            if (verifyInningsTerminationCheck()) {
                handleInningsWrapSequence();
            } else {
                syncScorecardUI();
            }
        }
    }

    function assessBowlingRoutines() {
        if (verifyInningsTerminationCheck()) {
            handleInningsWrapSequence();
            return;
        }

        // Structural Validation Checks Matrix
        let isUserQualifiedBowler = (playerProfile.role === "All-Rounder" || playerProfile.role === "Bowler");
        let safeFromConsecutiveRule = (matchEngine.overs !== matchEngine.lastBowledOverNum + 1);
        let withinAllowedQuotaLimit = (matchEngine.userOversBowledThisInnings < 4);

        if (isUserQualifiedBowler && safeFromConsecutiveRule && withinAllowedQuotaLimit && Math.random() < 0.5) {
            printLog(`⚡ The Captain tosses you the ball! You are coming into the attack for this over.`, "log-good");
            matchEngine.lastBowledOverNum = matchEngine.overs;
            updateEngineFlowState("USER_BOWLING_SPELL");
        } else {
            printLog(`AI teammate completes over number ${matchEngine.overs + 1}.`);
            let referenceStartingOver = matchEngine.overs;
            while (matchEngine.overs === referenceStartingOver && !verifyInningsTerminationCheck()) {
                processAILiveBall(0.06, 5.0);
            }
            assessBowlingRoutines();
        }
    }

    function executeUserBowlingBall() {
        let bowlPoolOutcomes = ["0", "1", "2", "4", "WICKET"];
        let result = bowlPoolOutcomes[Math.floor(Math.random() * bowlPoolOutcomes.length)];

        matchEngine.balls++;
        
        if (result === "WICKET") {
            matchEngine.wickets++;
            careerStats.wickets++; // Track career wickets directly
            printLog(`🏀 OUT! You found the leading edge! Big wicket for your spell!`, "log-wkt");
        } else {
            let runsConceded = parseInt(result);
            matchEngine.runs += runsConceded;
            printLog(`Batsman strokes your delivery into deep cover for ${runsConceded} run(s).`);
        }

        if (matchEngine.balls >= 6 || verifyInningsTerminationCheck()) {
            matchEngine.overs++;
            matchEngine.balls = 0;
            matchEngine.userOversBowledThisInnings++;
            printLog(`Spell segment complete. Over finished.`);
            assessBowlingRoutines();
        } else {
            syncScorecardUI();
        }
    }

    function completeRemainingInningsAuto() {
        while (!verifyInningsTerminationCheck()) {
            processAILiveBall(0.09, 5.5);
        }
        handleInningsWrapSequence();
    }

    function processAILiveBall(wktChance, avgRR) {
        matchEngine.balls++;
        if (matchEngine.balls >= 6) { matchEngine.overs++; matchEngine.balls = 0; }

        if (Math.random() < wktChance) {
            matchEngine.wickets++;
        } else {
            let runsDist =;
            matchEngine.runs += runsDist[Math.floor(Math.random() * runsDist.length)];
        }
    }

    function incrementBallMetricCounters() {
        matchEngine.balls++;
        if (matchEngine.balls >= 6) {
            matchEngine.overs++;
            matchEngine.balls = 0;
        }
    }

    function verifyInningsTerminationCheck() {
        if (matchEngine.wickets >= 10 || matchEngine.overs >= 20) return true;
        // In second innings, match automatically halts if chasing team slips past target metric thresholds 
        if (matchEngine.inningsNum === 2 && matchEngine.targetValue !== null && matchEngine.runs >= matchEngine.targetValue) return true;
        return false;
    }

    function handleInningsWrapSequence() {
        if (matchEngine.inningsNum === 1) {
            matchEngine.targetValue = matchEngine.runs + 1;
            printLog(`Innings Complete! Target calculated score set at ${matchEngine.targetValue} runs.`);
            updateEngineFlowState("PREPARE_INN_2");
        } else {
            printLog(`Second Innings complete. Field teams packing structural arrays.`);
            updateEngineFlowState("MATCH_FINALIZE");
        }
    }

    function resolveMatchPointsAllocation() {
        let userWon = false;
        if (matchEngine.userBattingFirst) {
            userWon = (matchEngine.targetValue > matchEngine.runs);
        } else {
            userWon = (matchEngine.runs >= matchEngine.targetValue);
        }

        if (userWon) {
            printLog(`🎉 VICTORY! Your franchise locks in key league context points splits!`, "log-good");
            leagueStandings[playerProfile.teamName] += 2;
        } else {
            printLog(`DEFEAT. Points surrendered to ${matchEngine.opponent}.`, "log-wkt");
            leagueStandings[matchEngine.opponent] += 2;
        }

        // Simulate other matches in the background
        let externalTeamsList = Object.keys(leagueStandings).filter(t => t !== playerProfile.teamName && t !== matchEngine.opponent);
        for(let i = 0; i < externalTeamsList.length; i += 2) {
            if (externalTeamsList[i+1]) {
                let chosenAIVictor = Math.random() < 0.5 ? externalTeamsList[i] : externalTeamsList[i+1];
                leagueStandings[chosenAIVictor] += 2;
            }
        }

        careerStats.matchDay++;
        refreshDashboardUI();

        // Check for promotion eligibility
        let activeTierMeta = CAREER_TIERS[careerStats.currentTierIdx];
        if (careerStats.runs >= activeTierMeta.runReq && careerStats.wickets >= activeTierMeta.wktReq) {
            if (careerStats.currentTierIdx < CAREER_TIERS.length - 1) {
                careerStats.currentTierIdx++;
                careerStats.matchDay = 1;
                alert(`🌟 PROMOTION GRANTED! Welcome to the prestigious ${CAREER_TIERS[careerStats.currentTierIdx].name}!`);
                updateUserFranchiseTeamIdentity();
                generateLeagueTable();
            } else {
                alert("🏆 LEGEND COMPLETED! You represent the pinnacle of global international format cycles!");
                printLog("YOU ARE A CRICKET LEGEND!", "log-good");
            }
        } else if (careerStats.matchDay > careerStats.maxMatches) {
            printLog("Season framework complete without hit targets. Renewing local matches scheduling list templates.");
            careerStats.matchDay = 1;
            generateLeagueTable();
        }

        updateEngineFlowState("TRIGGER_TOSS");
    }
</script>
