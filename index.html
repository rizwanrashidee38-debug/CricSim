
                                                            

                                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Career: Road to Team India</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        .hidden { display: none; }
        .tile-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .tile { height: 80px; background: #2c3e50; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; cursor: pointer; transition: transform 0.1s; }
        .tile:hover { background: #34495e; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; background: #e8f0fe; padding: 10px; border-radius: 5px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #219150; }
        .log { margin-top: 20px; text-align: left; height: 100px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🏏 Career Quest</h1>
    
    <!-- Registration Screen -->
    <div id="setup">
        <input type="text" id="pName" placeholder="Player Name" style="width:90%; padding:10px; margin-bottom:10px;"><br>
        <select id="pState" style="width:95%; padding:10px; margin-bottom:10px;">
            <option value="">Select Indian State</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Delhi">Delhi</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Punjab">Punjab</option>
        </select><br>
        <select id="pRole" style="width:95%; padding:10px; margin-bottom:10px;">
            <option value="Batter">Pure Batter</option>
            <option value="All-Rounder">All-Rounder</option>
        </select><br>
        <input type="number" id="pPos" placeholder="Batting Position (1-11)" min="1" max="11" style="width:90%; padding:10px; margin-bottom:20px;"><br>
        <button onclick="startGame()">Start Career</button>
    </div>

    <!-- Match Screen -->
    <div id="match" class="hidden">
        <div class="status-bar">
            <span id="display-level">Division 3</span>
            <span id="display-score">Score: 0/0</span>
        </div>
        <div id="match-info">Tossing the coin...</div>
        
        <div id="batting-section" class="hidden">
            <p>Select a tile to play the ball:</p>
            <div class="tile-container">
                <div class="tile" onclick="playBall()">?</div>
                <div class="tile" onclick="playBall()">?</div>
                <div class="tile" onclick="playBall()">?</div>
                <div class="tile" onclick="playBall()">?</div>
            </div>
        </div>

        <div id="bowling-section" class="hidden">
            <button onclick="bowlOver()">Bowl Next Over</button>
        </div>

        <div id="simulation-section" class="hidden">
            <button onclick="finishMatch()">Simulate Rest of Match</button>
        </div>

        <div id="log" class="log"></div>
    </div>
</div>

<script>
    let player = {};
    let gameState = {
        level: 3, // 3: Div 3, 2: Div 1, 1: Ranji, 0: India
        runs: 0,
        wickets: 0,
        balls: 0,
        target: 0,
        isBatting: false,
        careerRuns: 0,
        matchCount: 0,
        lastBowled: false
    };

    const levels = ["Team India 🇮🇳", "Ranji Trophy", "Division 1", "Division 3"];
    const outcomes = ["1", "2", "3", "4", "6", "Wicket-Bowled", "Wicket-Catch"];

    function startGame() {
        player.name = document.getElementById('pName').value;
        player.state = document.getElementById('pState').value;
        player.role = document.getElementById('pRole').value;
        player.pos = parseInt(document.getElementById('pPos').value);

        if(!player.name || !player.state || !player.pos) return alert("Please fill all details");

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('match').classList.remove('hidden');
        startMatch();
    }

    function startMatch() {
        gameState.runs = 0;
        gameState.wickets = 0;
        gameState.balls = 0;
        gameState.lastBowled = false;
        document.getElementById('log').innerHTML = "Match Started!";
        
        const winToss = Math.random() > 0.5;
        const chooseToBat = Math.random() > 0.5;
        
        if((winToss && chooseToBat) || (!winToss && !chooseToBat)) {
            gameState.isBatting = true;
            document.getElementById('match-info').innerText = "You won the toss and elected to Bat!";
            setupBattingInnings();
        } else {
            gameState.isBatting = false;
            document.getElementById('match-info').innerText = "Opponent elected to Bat. Time to field!";
            setupFieldingInnings();
        }
    }

    function setupBattingInnings() {
        document.getElementById('batting-section').classList.remove('hidden');
        document.getElementById('bowling-section').classList.add('hidden');
        updateDisplay();
    }

    function setupFieldingInnings() {
        document.getElementById('batting-section').classList.add('hidden');
        if(player.role === "All-Rounder") {
            document.getElementById('bowling-section').classList.remove('hidden');
        } else {
            document.getElementById('simulation-section').classList.remove('hidden');
        }
    }

    function playBall() {
        let result = outcomes[Math.floor(Math.random() * outcomes.length)];
        gameState.balls++;
        
        let logMsg = `Ball ${gameState.balls}: `;

        if(result.includes("Wicket")) {
            logMsg += `OUT! (${result.split('-')[1]})`;
            addLog(logMsg);
            endInnings();
        } else {
            let r = parseInt(result);
            gameState.runs += r;
            gameState.careerRuns += r;
            logMsg += `${r} runs.`;
            addLog(logMsg);
            
            if(gameState.balls >= 114) { // Penultimate (19th) over limit roughly
                endInnings();
            }
        }
        updateDisplay();
    }

    function endInnings() {
        document.getElementById('batting-section').classList.add('hidden');
        document.getElementById('simulation-section').classList.remove('hidden');
        document.getElementById('match-info').innerText = "Your innings is over. Simulating result...";
    }

    function finishMatch() {
        gameState.matchCount++;
        let matchResult = Math.random() > 0.4 ? "Won" : "Lost";
        
        alert(`Match Finished! You scored ${gameState.runs} runs. Your team ${matchResult}!`);
        
        // Progression Logic
        if(gameState.careerRuns > (4 - gameState.level) * 150) {
            if(gameState.level > 0) {
                gameState.level--;
                alert(`CONGRATULATIONS! You have been promoted to ${levels[gameState.level]}!`);
                gameState.careerRuns = 0; 
            } else {
                alert("You are now a Legend of Indian Cricket!");
            }
        }
        
        document.getElementById('display-level').innerText = levels[gameState.level];
        document.getElementById('simulation-section').classList.add('hidden');
        startMatch();
    }

    function updateDisplay() {
        document.getElementById('display-score').innerText = `Runs: ${gameState.runs} | Balls: ${gameState.balls}`;
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML = msg + "<br>" + log.innerHTML;
    }
</script>

</body>
</html>
